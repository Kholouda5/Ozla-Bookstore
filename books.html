<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>الكتب الورقية</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to bottom, #0f3d57, #1c4a60);
      color: white;
      text-align: center;
      padding: 30px;
    }

    .books-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
    }

    .book-card {
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 15px;
      width: 220px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .book-card img {
      width: 100%;
      border-radius: 8px;
    }

    .book-card h3, .book-card p {
      margin: 10px 0 5px;
    }
  </style>
</head>
<body>


  <h1>الكتب الورقية</h1>

  <div class="books-container">
    <div class="book-card">
      <img src="book1.jpg" alt="الخيميائي">
      <h3>الخيميائي</h3>
      <p>المؤلف: باولو كويلو</p>
      <p>السعر: 45 ريال</p>
    </div>

    <div class="book-card">
      <img src="book2.jpg" alt="ثلاثية غرناطة">
      <h3>ثلاثية غرناطة</h3>
      <p>المؤلف: رضوى عاشور</p>
      <p>السعر: 60 ريال</p>
    </div>

    <div class="book-card">
      <img src="book3.jpg" alt="مزرعة الحيوان">
      <h3>مزرعة الحيوان</h3>
      <p>المؤلف: جورج أورويل</p>
      <p>السعر: 35 ريال</p>
    </div>
  </div>
  <!-- كود الكتب هنا ... -->

<!-- كود الفاتورة هنا -->
<div class="invoice-box">
  <h3>احسب الفاتورة</h3>
  <label>سعر الكتاب:</label>
  <input type="number" id="price" placeholder="مثال: 30"><br>
  
  <label>الكمية:</label>
  <input type="number" id="quantity" placeholder="مثال: 2"><br>

  <button onclick="calculateInvoice()">احسب</button>

  <p id="result"></p>
</div>

<!-- ربط ملف الجافا سكربت -->
<script src="script.js"></script>
</body>
</html>

</body>
</html>
